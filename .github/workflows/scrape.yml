name: High Point Market Scraper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which step to run'
        required: true
        default: 'scrape_only'
        type: choice
        options:
          - harvest_urls
          - scrape_only
          - harvest_then_scrape
      test_mode:
        description: 'Test mode — scrape only first 3 URLs (scrape step only)'
        required: true
        default: 'yes'
        type: choice
        options: ['yes', 'no']

jobs:
  harvest:
    name: Harvest Exhibitor URLs
    runs-on: ubuntu-22.04
    if: ${{ inputs.mode == 'harvest_urls' || inputs.mode == 'harvest_then_scrape' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run URL harvester
        run: python harvest_urls.py

      - name: List output files
        run: ls -lh urls.xlsx || echo "urls.xlsx not found"

      - name: Upload urls.xlsx as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exhibitor-urls
          path: urls.xlsx
          if-no-files-found: warn

  scrape:
    name: Scrape Exhibitor Pages
    runs-on: ubuntu-22.04
    needs: harvest
    if: |
      always() &&
      (inputs.mode == 'scrape_only' || inputs.mode == 'harvest_then_scrape') &&
      (needs.harvest.result == 'success' || needs.harvest.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download urls.xlsx from harvest artifact
        if: ${{ inputs.mode == 'harvest_then_scrape' }}
        uses: actions/download-artifact@v4
        with:
          name: exhibitor-urls
          path: .

      - name: Verify urls.xlsx exists
        run: |
          if [ ! -f urls.xlsx ]; then
            echo "ERROR: urls.xlsx not found."
            echo "Either commit it to the repo, or use harvest_then_scrape mode."
            exit 1
          fi
          echo "urls.xlsx found — $(python -c 'import openpyxl; wb=openpyxl.load_workbook("urls.xlsx"); print(wb.active.max_row - 1)') URLs"

      - name: Run scraper
        env:
          TEST_MODE: ${{ inputs.test_mode == 'yes' && '3' || '0' }}
        run: python scraper.py

      - name: List output files
        if: always()
        run: ls -lh exhibitors_output.xlsx progress.json 2>/dev/null || echo "(none found)"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exhibitor-results
          path: |
            exhibitors_output.xlsx
            progress.json
          if-no-files-found: warn
